<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Dynamic Metadata -->
    <meta name="description" content="[$meta.description]" />
    <meta name="keywords" content="[$meta.tags]" />
    <meta name="author" content="[author]" />
    <meta name="version" content="[version]" />

    <title>[$meta.title]</title>

    <!-- Favicon -->
    <link
      rel="shortcut icon"
      href="https://user.uploads.dev/file/8c7563d0ece7c9ed36c8a83f8361a7a7.webp"
      type="image/x-icon"
    />

    <!-- Base Styling -->
    <style>
      :root {
        --bg: #0d0d0d;
        --bg-alt: #1a1a1a;
        --text: #e6e6e6;
        --accent: #4da3ff;
        --border: #333;
        --radius: 8px;
        --transition: 0.25s ease;
      }

      [data-theme="light"] {
        --bg: #ffffff;
        --bg-alt: #f2f2f2;
        --text: #111;
        --accent: #0066cc;
        --border: #ccc;
      }

      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, sans-serif;
        transition:
          background var(--transition),
          color var(--transition);
      }

      header,
      footer {
        padding: 20px;
        text-align: center;
        background: var(--bg-alt);
        border-bottom: 1px solid var(--border);
      }

      footer {
        border-top: 1px solid var(--border);
        border-bottom: none;
      }

      main {
        padding: 20px;
        max-width: 900px;
        margin: auto;
      }

      h1,
      h2,
      h3 {
        margin-top: 0;
        color: var(--accent);
      }

      .container {
        background: var(--bg-alt);
        padding: 20px;
        border-radius: var(--radius);
        border: 1px solid var(--border);
        margin-bottom: 20px;
      }

      .btn {
        display: inline-block;
        padding: 10px 16px;
        background: var(--accent);
        color: #fff;
        border-radius: var(--radius);
        cursor: pointer;
        transition: opacity var(--transition);
        text-decoration: none;
      }

      .btn:hover {
        opacity: 0.8;
      }

      .theme-toggle {
        position: fixed;
        top: 15px;
        right: 15px;
        padding: 10px 14px;
        background: var(--accent);
        border-radius: var(--radius);
        cursor: pointer;
        user-select: none;
      }
    </style>
  </head>

  <body>
    <!-- Theme Toggle -->
    <div class="theme-toggle" onclick="toggleTheme()">Theme</div>

    <header>
      <h1>[$meta.title]</h1>
      <p>[$meta.description]</p>
    </header>

    <main>
      <!-- Dynamic Content Container -->
      <section class="container" id="content-area">
        <h2>Main Content</h2>
        <h3>[$output]</h3>
        <h3>[animeModifiers]</h3>
        <h3>[animeModifiers.style.Ghibli]</h3>
        <h3>[animeModifiers.effect.toon]</h3>
      </section>
    </main>

    <footer>
      <p>
        Copyright © [author]
        <span id="year"></span> — Version: [version]
      </p>
    </footer>

    <!-- Logic / Methods / Mechanics -->
    <script>
      // Auto-year
      document.getElementById("year").textContent = new Date().getFullYear();

      // Theme System
      function toggleTheme() {
        const html = document.documentElement;
        html.dataset.theme = html.dataset.theme === "light" ? "dark" : "light";
      }
    </script>
  </body>
</html>
